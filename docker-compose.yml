services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://healthagent:healthagent@postgres:5432/healthagent
      REDIS_URL: redis://redis:6379/0
      API_CORS_ORIGINS: http://localhost:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-http://hapi-fhir:8080/fhir}
      USE_HAPI_FHIR: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - hapi-fhir
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://healthagent:healthagent@postgres:5432/healthagent
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-http://hapi-fhir:8080/fhir}
      USE_HAPI_FHIR: "true"
    depends_on:
      - api
      - redis
    volumes:
      - ./data:/app/data

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: healthagent
      POSTGRES_USER: healthagent
      POSTGRES_PASSWORD: healthagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  hapi-fhir:
    image: hapiproject/hapi:latest
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.server_address: http://localhost:8080/fhir
    ports:
      - "8080:8080"

volumes:
  postgres-data:
